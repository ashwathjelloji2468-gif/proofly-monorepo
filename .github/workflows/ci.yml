name: Monorepo CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: proofly_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js v20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install Dependencies
      run: |
        npm ci --prefix backend
        npm ci --prefix frontend

    - name: Prisma Client Generate
      run: npm run db:generate --prefix backend

    - name: TypeScript Compile Checks
      run: |
        npm run build --prefix backend
        npm run build --prefix frontend

    - name: Push Prisma Schema to Test DB
      run: npx prisma db push --schema=prisma/schema.prisma
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/proofly_db_test

    - name: Execute Backend Tests
      run: npm run test --prefix backend
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/proofly_db_test
        JWT_SECRET: test-jwt-secret-verification-12345

    - name: Docker image compile verification
      run: docker build -t proofly-monorepo:latest .
