name: Monorepo CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js v20
      uses: actions/setup-node@v4
      with:
        node-size: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Prisma Client Generate
      run: npx prisma generate --schema=./backend/prisma/schema.prisma

    - name: TypeScript Compile Checks
      run: |
        npm run build --workspace=backend
        npm run build --workspace=frontend

    - name: Execute Backend Tests
      run: npm run test --workspace=backend --if-present

    - name: Docker image compile verification
      run: docker build -t proofly-monorepo:latest .
