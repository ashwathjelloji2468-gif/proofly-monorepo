version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: proofly-postgres
    environment:
      POSTGRES_DB: proofly_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proofly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proofly-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proofly-monorepo
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/proofly_db?schema=public
      - NODE_ENV=production
    ports:
      - "3000:3000"
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
