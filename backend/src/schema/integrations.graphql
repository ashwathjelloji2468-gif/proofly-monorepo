type ApiKey {
  id: ID!
  spaceId: ID!
  name: String!
  prefix: String!
  scopes: String!
  expiresAt: String
  lastUsed: String
  createdAt: String!
  plainKey: String
}

type WebhookSubscription {
  id: ID!
  spaceId: ID!
  targetUrl: String!
  events: String!
  secret: String!
  status: String!
  createdAt: String!
  logs: [WebhookLog!]!
}

type WebhookLog {
  id: ID!
  subscriptionId: ID!
  event: String!
  statusCode: Int!
  payload: String!
  duration: Int!
  createdAt: String!
}

type IntegrationConnection {
  id: ID!
  spaceId: ID!
  appId: String!
  status: String!
  config: String
  createdAt: String!
  updatedAt: String!
}

type ApiLog {
  id: ID!
  spaceId: ID!
  endpoint: String!
  method: String!
  statusCode: Int!
  ipAddress: String
  duration: Int!
  createdAt: String!
}

extend type Query {
  apiKeys(spaceId: ID!): [ApiKey!]!
  webhooks(spaceId: ID!): [WebhookSubscription!]!
  connections(spaceId: ID!): [IntegrationConnection!]!
  apiLogs(spaceId: ID!): [ApiLog!]!
}

extend type Mutation {
  createApiKey(spaceId: ID!, name: String!, scopes: String!): ApiKey!
  revokeApiKey(id: ID!): Boolean!
  createWebhook(spaceId: ID!, targetUrl: String!, events: String!): WebhookSubscription!
  deleteWebhook(id: ID!): Boolean!
  connectApp(spaceId: ID!, appId: String!, config: String): IntegrationConnection!
  disconnectApp(spaceId: ID!, appId: String!): Boolean!
}
