enum SpaceRole {
  OWNER
  ADMIN
  MANAGER
  MEMBER
  VIEWER
}

type WorkspaceInvitation {
  id: ID!
  spaceId: ID!
  email: String!
  role: SpaceRole!
  expiresAt: String!
}

type SpaceMember {
  id: ID!
  spaceId: ID!
  userId: ID!
  role: SpaceRole!
  user: User!
}

type OTPPayload {
  email: String!
  message: String!
}

type User {
  id: ID!
  email: String!
  name: String!
  tier: BillingTier!
  aiCreditsUsed: Int!
  isVerified: Boolean!
  status: String!
  provider: String!
  hasPassword: Boolean!
  role: String!
  createdAt: String!
  updatedAt: String!
  spaces: [Space!]!
}

type AuthPayload {
  # token is intentionally omitted — auth uses secure HttpOnly cookies, never JS-accessible tokens
  user: User!
}

type SessionPayload {
  id: ID!
  userAgent: String
  ipAddress: String
  deviceType: String
  createdAt: String!
  expiresAt: String!
  isValid: Boolean!
  isCurrent: Boolean
}

extend type Query {
  me: User
  getWorkspaceInvitations(spaceId: ID!): [WorkspaceInvitation!]!
  getWorkspaceMembers(spaceId: ID!): [SpaceMember!]!
  activeSessions: [SessionPayload!]!
}

extend type Mutation {
  signup(email: String!, name: String!, password: String!): AuthPayload!
  login(email: String!, password: String!): AuthPayload!
  githubLogin(code: String!): AuthPayload!
  googleLogin(code: String!): AuthPayload!
  logout: Boolean!
  refreshSession: Boolean!
  updateBillingTier(tier: BillingTier!): User!
  
  verifyEmail(token: String!): AuthPayload!
  resendVerificationEmail(email: String!): Boolean!
  requestPasswordReset(email: String!): OTPPayload!
  verifyOTP(email: String!, otp: String!): String!
  resetPassword(email: String!, token: String!, newPassword: String!): Boolean!
  requestEmailChange(newEmail: String!): Boolean!
  verifyEmailChangeToken(token: String!): Boolean!
  inviteToWorkspace(spaceId: ID!, email: String!, role: SpaceRole!): Boolean!
  acceptWorkspaceInvitation(token: String!): Boolean!
  removeWorkspaceMember(memberId: ID!): Boolean!
  setPassword(password: String!): Boolean!
  revokeSession(sessionId: ID!): Boolean!
  revokeAllSessions: Boolean!
}
